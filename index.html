<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Sign Up Form</title>
</head>
<body>
    <div class="main-container">
        <div class="image-bg-container">
           
            <div class="logo-text-container">
                <div class="logo">
                    <img src="/images/odin-lined.png" alt="">
                </div>

                <p class="odin-font">ODIN</p>

            </div>
        </div>

        <div class="form-container">
            
            <div class="form-top-text">
                <div class="para-one">
                    <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
                </div>
                
                <div class="para-two">
                    <p>You know you want to.</p>
                </div>
            </div>

            <div class="form">

                <form action="get">
                    <p>Let's do this!</p>
                    <label for="first">First Name</label>
                    <input type="text" id="first" name="first">

                    <label for="last">Last Name</label>
                    <input type="text" id="last" name="last">
                </form>
            </div>

            <div class="create-btn">
                <button>Create Account</button>

                <p>Already have an account? 
                    <a href="#">Log in</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
